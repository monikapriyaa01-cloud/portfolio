<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
        background-color: rgb(86, 47, 123);
    }
    .cont{
        height: 500px;
        background-color: whitesmoke;
        width: 500px;
        border-radius: 50px;
        margin: auto;
        margin-top: 300px;
        box-shadow: 20px 20px 20px black;
        font-family: 'Poppins', sans-serif;
        text-align: center;
        padding-top: 20px;  
        font-weight: 500;
    }
    .cont h1{
        font-size: x-large;
        color: rgb(86, 47, 123);
    } 
    input[type=text] {
        width: 400px;
        height: 30px;
        margin-bottom: 30px;
        margin-top: 10px;
        box-shadow: 5px 5px 2px black;
        margin-right: 50px;
        border-radius: 5px;
    }
    input[type=email]{
        width: 400px;
        height: 30px;
        margin-bottom: 30px;
        margin-top: 10px;
        box-shadow: 5px 5px 2px black;
        margin-right:50px ;
        border-radius: 5px;
    }
    input[type=password]{
        width: 400px;
        height: 30px;
        margin-top: 10px;
        box-shadow: 5px 5px 2px black;
        margin-right: 50px;
        border-radius: 5px;
    }
    .f1{
        padding-right: 410px;
    }
    .f2{
        padding-right: 380px;
    }
    .but{
        margin-top: 100px;
        height: 50px;
        width: 200px;
        border-radius: 50px;
        background-color: rgb(86, 47, 123);
        font-weight: bolder;
        font-size: large;
        box-shadow: 5px 5px 2px black;
        text-align: center;
        margin: auto;
        margin-top: 50px;
    }
    .but:hover{
        cursor: pointer;
    }
    .txt a{
       color: rgb(86, 47, 123);
       font-weight: bold; 
       text-decoration: none;
    }
    .txt a:hover{
        text-decoration: underline;
        cursor: pointer;
    }
    </style>
</head>
<body><form action="">
    <div class="cont">
        <h1>SIGN UP</h1>
        <label class="f1">Name</label>
        <input type="text" placeholder="Enter your full name">
        <label class="f1">Email</label>
        <input type="email" placeholder="Enter your email">
        <label class="f2">Password</label>
        <input type="password" placeholder="Enter your passwword">
        <button class="but">SIGN UP !

        </button>
        <p class="txt"> Have an Account ? <a href="#">Login Here !</a></p>
        
    </div>
    </form>
</body>
</html>
